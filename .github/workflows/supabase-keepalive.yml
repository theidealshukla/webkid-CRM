name: Supabase Keep-Alive

on:
  schedule:
    # Every 3 days at 06:00 UTC. Supabase free-tier pauses after ~7 days idle.
    - cron: "0 6 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      HEALTH_URL: ${{ secrets.HEALTH_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Ping health endpoint
        if: env.HEALTH_URL != ''
        run: |
          set -e
          response=$(curl -s -o /tmp/body -w "%{http_code}" "$HEALTH_URL")
          echo "HTTP $response"
          cat /tmp/body
          test "$response" = "200"

      - name: Fallback - direct Supabase REST ping
        if: env.HEALTH_URL == ''
        run: |
          set -e
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Set HEALTH_URL OR (SUPABASE_URL + SUPABASE_ANON_KEY) repo secrets."
            exit 1
          fi
          curl -fsSL "$SUPABASE_URL/rest/v1/users?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY"
          echo "OK"
