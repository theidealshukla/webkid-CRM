name: Supabase Keep-Alive

on:
  schedule:
    # Every 3 days at 06:00 UTC. Supabase free-tier pauses after ~7 days idle.
    - cron: "0 6 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        if: ${{ secrets.HEALTH_URL != '' }}
        run: |
          set -e
          response=$(curl -s -o /tmp/body -w "%{http_code}" "${{ secrets.HEALTH_URL }}")
          echo "HTTP $response"
          cat /tmp/body
          test "$response" = "200"

      - name: Fallback — direct Supabase REST ping
        if: ${{ secrets.HEALTH_URL == '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "Set HEALTH_URL OR (SUPABASE_URL + SUPABASE_ANON_KEY) repo secrets."
            exit 1
          fi
          curl -fsSL "$SUPABASE_URL/rest/v1/users?select=id&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY"
          echo "OK"
